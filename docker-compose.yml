services:
  postgresql:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: events_db
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d events_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:latest
    # No healthcheck - causes startup issues
    # healthcheck:
    #   test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8222/healthz"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 3

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=postgres
      - DB_NAME=events_db
      - NATS_URL=nats://nats:4222
    depends_on:
      nats:
        condition: service_started
      postgresql:
        condition: service_healthy

  publisher:
    image: andriiuni/events
    environment:
      - EVENT_ENDPOINT=http://app:3000/webhook
    depends_on:
      app:
        condition: service_started